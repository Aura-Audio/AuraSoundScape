<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundscape Generator – Structured Noise Engine</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --text: #c8c8d4;
            --accent1: #e0a458;
            --accent2: #5ba0c8;
            --accent3: #8b6c9e;
            --danger: #c55555;
            --glow-low: rgba(180, 100, 40, 0.4);
            --glow-mid: rgba(70, 130, 170, 0.35);
            --glow-high: rgba(140, 100, 180, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 820px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header { text-align: center; }
        .header h1 { font-size: 1.9rem; font-weight: 300; letter-spacing: 0.06em; color: #e8e8f0; margin-bottom: 4px; }
        .header .subtitle { font-size: 0.85rem; letter-spacing: 0.1em; color: #8888a0; text-transform: uppercase; }

        .state-label {
            font-size: 0.9rem; letter-spacing: 0.08em; color: #b0b0c8; text-align: center;
            min-height: 1.4em; transition: color 3s ease, opacity 2s ease; opacity: 0.8;
        }

        .visualizer-wrap {
            position: relative; width: 100%; aspect-ratio: 2 / 1; max-height: 400px;
            border-radius: 20px; overflow: hidden; background: var(--surface);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5), inset 0 0 80px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        canvas { display: block; width: 100%; height: 100%; }

        .controls { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; align-items: center; width: 100%; }

        .btn {
            padding: 12px 28px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04); color: #d0d0e0; cursor: pointer;
            font-size: 1rem; letter-spacing: 0.05em; transition: all 0.3s ease;
            backdrop-filter: blur(6px); font-family: inherit; white-space: nowrap;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px rgba(150, 150, 200, 0.2); }
        
        .btn.primary { background: rgba(200, 160, 80, 0.15); border-color: rgba(200, 160, 80, 0.5); color: #e8c878; font-weight: 500; font-size: 1.05rem; padding: 13px 34px; }
        .btn.primary:hover { background: rgba(200, 160, 80, 0.25); box-shadow: 0 0 35px var(--glow-low); }
        .btn.primary.running { background: rgba(200, 80, 70, 0.2); border-color: rgba(200, 80, 70, 0.5); color: #e89088; }
        .btn.primary.running:hover { background: rgba(200, 80, 70, 0.3); box-shadow: 0 0 35px rgba(200, 80, 70, 0.4); }
        
        .btn.record { background: rgba(197, 85, 85, 0.15); border-color: rgba(197, 85, 85, 0.5); color: #e89088; }
        .btn.record.recording { background: rgba(197, 85, 85, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(197, 85, 85, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(197, 85, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(197, 85, 85, 0); } }

        .btn.preset { font-size: 0.8rem; padding: 8px 16px; border-radius: 20px; letter-spacing: 0.04em; }

        .slider-group { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 80px; }
        .slider-group label { font-size: 0.7rem; letter-spacing: 0.06em; color: #9999b0; text-transform: uppercase; }
        .slider-group input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: rgba(255, 255, 255, 0.15); outline: none; cursor: pointer; }
        .slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #c8c8e0; border: 2px solid rgba(255, 255, 255, 0.3); cursor: pointer; box-shadow: 0 0 12px rgba(180, 180, 210, 0.4); }

        @media (max-width: 600px) {
            .container { padding: 12px; gap: 14px; }
            .header h1 { font-size: 1.4rem; }
            .btn { padding: 10px 18px; font-size: 0.85rem; }
            .btn.primary { padding: 11px 22px; font-size: 0.9rem; }
            .controls { gap: 10px; }
            .slider-group { min-width: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Soundscape Generator</h1>
            <div class="subtitle">Structured · Evolving · Non-looping</div>
        </div>

        <div class="state-label" id="stateLabel">— awaiting initiation —</div>

        <div class="visualizer-wrap">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="controls">
            <button class="btn primary" id="btnStart" title="Start / Stop the soundscape">▶ Begin</button>
            <button class="btn record" id="btnRecord" title="Record Audio">⏺ Record</button>
            <button class="btn preset" data-preset="deep">🌊 Deep</button>
            <button class="btn preset" data-preset="wind">🌬️ Wind</button>
            <button class="btn preset" data-preset="crystal">💎 Crystal</button>
            <button class="btn preset" data-preset="experimental">🌀 Experimental</button>
        </div>

        <div class="controls" style="flex-wrap:wrap;gap:20px;margin-top:4px;">
            <div class="slider-group"><label>Volume</label><input type="range" id="sliderVolume" min="0" max="100" value="60" step="1"></div>
            <div class="slider-group"><label>Density</label><input type="range" id="sliderDensity" min="20" max="100" value="65" step="1"></div>
            <div class="slider-group"><label>Movement</label><input type="range" id="sliderMovement" min="10" max="100" value="55" step="1"></div>
            <div class="slider-group"><label>Reverb</label><input type="range" id="sliderReverb" min="5" max="80" value="35" step="1"></div>
        </div>
    </div>

    <script>
        class SoundscapeEngine {
            constructor() {
                this.ui = {
                    canvas: document.getElementById('visualizer'),
                    ctx: document.getElementById('visualizer').getContext('2d'),
                    btnStart: document.getElementById('btnStart'),
                    btnRecord: document.getElementById('btnRecord'),
                    stateLabel: document.getElementById('stateLabel'),
                    sliderVolume: document.getElementById('sliderVolume'),
                    sliderDensity: document.getElementById('sliderDensity'),
                    sliderMovement: document.getElementById('sliderMovement'),
                    sliderReverb: document.getElementById('sliderReverb'),
                    presetButtons: document.querySelectorAll('.btn.preset')
                };

                this.audioCtx = null;
                this.isRunning = false;
                this.isRecording = false;
                this.mediaRecorder = null;
                this.recordedChunks = [];
                this.animFrameId = null;
                this.eventTimeout = null;

                // Parameter Targets
                this.params = { volume: 0.6, density: 0.65, movement: 0.55, reverb: 0.35 };
                this.smoothing = 0.04;
                this.slowPhaseAccum = 0;
                this.currentStateName = '';

                this.nodes = {}; // Store references to audio nodes for manipulation

                this.init();
            }

            init() {
                this.setupEventListeners();
                this.resizeCanvas();
                this.drawIdleVisual();
                console.log('🌊 Soundscape Generator ready.');
            }

            setupEventListeners() {
                this.ui.btnStart.addEventListener('click', () => this.toggleEngine());
                this.ui.btnRecord.addEventListener('click', () => this.toggleRecording());

                // Native Web Audio Smoothing via setTargetAtTime
                const bindSlider = (slider, paramKey, nodePath) => {
                    slider.addEventListener('input', () => {
                        this.params[paramKey] = parseInt(slider.value) / 100;
                        if (this.isRunning) this.applyParameters();
                    });
                };

                bindSlider(this.ui.sliderVolume, 'volume');
                bindSlider(this.ui.sliderDensity, 'density');
                bindSlider(this.ui.sliderMovement, 'movement');
                bindSlider(this.ui.sliderReverb, 'reverb');

                this.ui.presetButtons.forEach(btn => {
                    btn.addEventListener('click', () => this.applyPreset(btn.dataset.preset));
                });

                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); this.toggleEngine(); }
                    if (e.code === 'KeyD') this.applyPreset('deep');
                    if (e.code === 'KeyW') this.applyPreset('wind');
                    if (e.code === 'KeyC') this.applyPreset('crystal');
                    if (e.code === 'KeyE') this.applyPreset('experimental');
                });

                window.addEventListener('resize', () => {
                    this.resizeCanvas();
                    if (!this.isRunning) this.drawIdleVisual();
                });
            }

            // ─────────────────────────────────────
            // AUDIO GENERATION
            // ─────────────────────────────────────
            createNoiseBuffer(ctx, durationSec, type = 'white') {
                const sampleRate = ctx.sampleRate;
                const length = Math.floor(sampleRate * durationSec);
                const buffer = ctx.createBuffer(1, length, sampleRate);
                const data = buffer.getChannelData(0);

                if (type === 'brown') {
                    let lastOut = 0.0;
                    for (let i = 0; i < length; i++) {
                        const white = Math.random() * 2 - 1;
                        data[i] = (lastOut + (0.02 * white)) / 1.02;
                        lastOut = data[i];
                        data[i] *= 3.5; // Boost
                    }
                } else {
                    for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
                }
                return buffer;
            }

            createReverb(ctx) {
                // Improved delays for actual reverb tail (50ms - 110ms range)
                const delays = [0.053, 0.071, 0.097, 0.113]; 
                const feedbacks = [0.65, 0.60, 0.58, 0.55];
                const dampFreqs = [4000, 3500, 3000, 2800];

                const inputGain = ctx.createGain(); inputGain.gain.value = 0.7;
                const outputGain = ctx.createGain(); outputGain.gain.value = 1.0;
                const merger = ctx.createGain(); merger.gain.value = 0.25;

                // Master Lowpass to tame metallic ringing
                const masterLPF = ctx.createBiquadFilter();
                masterLPF.type = 'lowpass'; masterLPF.frequency.value = 6500; masterLPF.Q.value = 0.7;

                for (let i = 0; i < delays.length; i++) {
                    const delayNode = ctx.createDelay(delays[i] + 0.01);
                    delayNode.delayTime.value = delays[i];
                    const feedbackGain = ctx.createGain(); feedbackGain.gain.value = feedbacks[i];
                    const dampFilter = ctx.createBiquadFilter();
                    dampFilter.type = 'lowpass'; dampFilter.frequency.value = dampFreqs[i]; dampFilter.Q.value = 0.5;

                    delayNode.connect(dampFilter);
                    dampFilter.connect(feedbackGain);
                    feedbackGain.connect(delayNode);
                    delayNode.connect(merger);
                    inputGain.connect(delayNode);
                }

                merger.connect(masterLPF);
                masterLPF.connect(outputGain);

                return { input: inputGain, output: outputGain };
            }

            buildAudioGraph(ctx) {
                const nodes = {};
                // Prime durations for non-repeating loops
                const buf1 = this.createNoiseBuffer(ctx, 7.31, 'brown'); // Brown noise for deep rumble
                const buf2 = this.createNoiseBuffer(ctx, 11.17, 'white');
                const buf3 = this.createNoiseBuffer(ctx, 13.43, 'white');

                // ── Layer 1: Deep (Brown) ──
                nodes.src1 = ctx.createBufferSource(); nodes.src1.buffer = buf1; nodes.src1.loop = true;
                nodes.gain1 = ctx.createGain(); nodes.gain1.gain.value = 0.55;
                nodes.lp1 = ctx.createBiquadFilter(); nodes.lp1.type = 'lowpass'; nodes.lp1.frequency.value = 160; nodes.lp1.Q.value = 0.45;
                
                nodes.src1.connect(nodes.gain1).connect(nodes.lp1);

                // ── Layer 2: Mid ──
                nodes.src2 = ctx.createBufferSource(); nodes.src2.buffer = buf2; nodes.src2.loop = true;
                nodes.gain2 = ctx.createGain(); nodes.gain2.gain.value = 0.50;
                nodes.bp2 = ctx.createBiquadFilter(); nodes.bp2.type = 'bandpass'; nodes.bp2.frequency.value = 1100; nodes.bp2.Q.value = 2.2;
                
                nodes.src2.connect(nodes.gain2).connect(nodes.bp2);

                // ── Layer 3: Air ──
                nodes.src3 = ctx.createBufferSource(); nodes.src3.buffer = buf3; nodes.src3.loop = true;
                nodes.gain3 = ctx.createGain(); nodes.gain3.gain.value = 0.40;
                nodes.hp3 = ctx.createBiquadFilter(); nodes.hp3.type = 'highpass'; nodes.hp3.frequency.value = 4200; nodes.hp3.Q.value = 0.6;
                
                nodes.src3.connect(nodes.gain3).connect(nodes.hp3);

                // ── LFOs (Irrational Frequencies) ──
                const createLFO = (freq, depth, target) => {
                    const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = freq;
                    const lfoGain = ctx.createGain(); lfoGain.gain.value = depth;
                    lfo.connect(lfoGain).connect(target);
                    lfo.start(0);
                    return { osc: lfo, gain: lfoGain };
                };

                nodes.lfo1 = createLFO(0.027, 65, nodes.lp1.frequency);
                nodes.lfo2 = createLFO(0.041, 450, nodes.bp2.frequency);
                nodes.lfo3 = createLFO(0.059, 1800, nodes.hp3.frequency);
                
                // Amp Mod / Tremolo
                nodes.lfoAmp1 = createLFO(0.033, 0.12, nodes.gain1.gain);
                nodes.lfoQ2 = createLFO(0.073, 0.9, nodes.bp2.Q);
                nodes.lfoTrem3 = createLFO(0.11, 0.06, nodes.gain3.gain);

                // ── Routing & Panning ──
                nodes.pan1 = ctx.createStereoPanner(); nodes.pan1.pan.value = -0.15;
                nodes.pan2 = ctx.createStereoPanner(); nodes.pan2.pan.value = 0.10;
                nodes.pan3 = ctx.createStereoPanner(); nodes.pan3.pan.value = 0.20;

                nodes.lp1.connect(nodes.pan1);
                nodes.bp2.connect(nodes.pan2);
                nodes.hp3.connect(nodes.pan3);

                // ── Reverb ──
                nodes.reverb = this.createReverb(ctx);
                nodes.reverbGain = ctx.createGain(); nodes.reverbGain.gain.value = 0.30;
                nodes.reverb.output.connect(nodes.reverbGain);

                nodes.send1 = ctx.createGain(); nodes.send1.gain.value = 0.35;
                nodes.send2 = ctx.createGain(); nodes.send2.gain.value = 0.45;
                nodes.send3 = ctx.createGain(); nodes.send3.gain.value = 0.50;
                
                nodes.pan1.connect(nodes.send1).connect(nodes.reverb.input);
                nodes.pan2.connect(nodes.send2).connect(nodes.reverb.input);
                nodes.pan3.connect(nodes.send3).connect(nodes.reverb.input);

                // ── Master Mix ──
                nodes.dryMix = ctx.createGain(); nodes.dryMix.gain.value = 0.85;
                nodes.pan1.connect(nodes.dryMix); nodes.pan2.connect(nodes.dryMix); nodes.pan3.connect(nodes.dryMix);

                nodes.masterGain = ctx.createGain(); nodes.masterGain.gain.value = 0.0; // Start silent for fade-in
                nodes.dryMix.connect(nodes.masterGain);
                nodes.reverbGain.connect(nodes.masterGain);

                // ── Master LFO (Multi-minute swell) ──
                nodes.masterLfo = createLFO(0.0056, 0.10, nodes.masterGain.gain);

                // ── Analyser ──
                nodes.analyser = ctx.createAnalyser();
                nodes.analyser.fftSize = 2048; nodes.analyser.smoothingTimeConstant = 0.82;
                nodes.masterGain.connect(nodes.analyser);
                nodes.analyser.connect(ctx.destination);

                // Start Sources
                nodes.src1.start(0); nodes.src2.start(0); nodes.src3.start(0);

                return nodes;
            }

            // ─────────────────────────────────────
            // ENGINE CONTROL
            // ─────────────────────────────────────
            toggleEngine() {
                if (this.isRunning) this.stopEngine();
                else this.startEngine();
            }

            startEngine() {
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();

                this.nodes = this.buildAudioGraph(this.audioCtx);
                this.applyParameters();

                // Fade In over 2 seconds
                const now = this.audioCtx.currentTime;
                this.nodes.masterGain.gain.cancelScheduledValues(now);
                this.nodes.masterGain.gain.setValueAtTime(0, now);
                this.nodes.masterGain.gain.linearRampToValueAtTime(this.params.volume * 0.7, now + 2.0);

                this.isRunning = true;
                this.ui.btnStart.textContent = '■ Stop';
                this.ui.btnStart.classList.add('running');
                this.ui.stateLabel.textContent = '— emerging soundscape —';
                this.ui.stateLabel.style.color = '#c8c8e0';

                this.animateVisualizer();
                this.scheduleNextEvent();
            }

            stopEngine() {
                if (!this.isRunning) return;
                const now = this.audioCtx.currentTime;

                // Fade Out over 1.5 seconds
                this.nodes.masterGain.gain.cancelScheduledValues(now);
                this.nodes.masterGain.gain.setValueAtTime(this.nodes.masterGain.gain.value, now);
                this.nodes.masterGain.gain.linearRampToValueAtTime(0, now + 1.5);

                this.isRunning = false;
                this.ui.btnStart.textContent = '▶ Begin';
                this.ui.btnStart.classList.remove('running');
                this.ui.stateLabel.textContent = '— silent —';
                this.ui.stateLabel.style.color = '#8888a0';

                // Stop nodes after fade out completes
                setTimeout(() => {
                    if(this.nodes.src1) { try { this.nodes.src1.stop(0); } catch(e){} }
                    if(this.nodes.src2) { try { this.nodes.src2.stop(0); } catch(e){} }
                    if(this.nodes.src3) { try { this.nodes.src3.stop(0); } catch(e){} }
                    // Disconnect all to free memory
                    Object.values(this.nodes).forEach(node => { if(node && node.disconnect) node.disconnect(); });
                    this.nodes = {};
                    if(this.animFrameId) cancelAnimationFrame(this.animFrameId);
                    if(this.eventTimeout) clearTimeout(this.eventTimeout);
                }, 1600);
            }

            // ─────────────────────────────────────
            // RECORDING (MediaRecorder API)
            // ─────────────────────────────────────
            toggleRecording() {
                if (!this.isRunning) return;
                if (!this.isRecording) {
                    const dest = this.audioCtx.createMediaStreamDestination();
                    this.nodes.masterGain.connect(dest);
                    this.mediaRecorder = new MediaRecorder(dest.stream);
                    this.recordedChunks = [];
                    
                    this.mediaRecorder.ondataavailable = (e) => this.recordedChunks.push(e.data);
                    this.mediaRecorder.onstop = () => {
                        const blob = new Blob(this.recordedChunks, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = `soundscape-${Date.now()}.webm`; a.click();
                        URL.revokeObjectURL(url);
                    };
                    this.mediaRecorder.start();
                    this.isRecording = true;
                    this.ui.btnRecord.classList.add('recording');
                    this.ui.btnRecord.textContent = '■ Stop Rec';
                } else {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    this.ui.btnRecord.classList.remove('recording');
                    this.ui.btnRecord.textContent = '⏺ Record';
                }
            }

            // ─────────────────────────────────────
            // PARAMETER SMOOTHING & APPLICATION
            // ─────────────────────────────────────
            applyParameters() {
                if (!this.isRunning || !this.nodes.masterGain) return;
                const t = this.audioCtx.currentTime;
                const timeConstant = 0.1; // Native Web Audio smoothing

                this.nodes.masterGain.gain.setTargetAtTime(this.params.volume * 0.7, t, timeConstant);

                // Density
                this.nodes.gain1.gain.setTargetAtTime(0.25 + this.params.density * 0.45, t, timeConstant);
                this.nodes.gain2.gain.setTargetAtTime(0.10 + this.params.density * 0.40, t, timeConstant);
                this.nodes.gain3.gain.setTargetAtTime(0.05 + this.params.density * 0.30, t, timeConstant);

                // Movement (LFO Depths)
                this.nodes.lfo1.gain.gain.setTargetAtTime(25 + this.params.movement * 100, t, timeConstant);
                this.nodes.lfo2.gain.gain.setTargetAtTime(150 + this.params.movement * 700, t, timeConstant);
                this.nodes.lfo3.gain.gain.setTargetAtTime(600 + this.params.movement * 2800, t, timeConstant);
                this.nodes.lfoAmp1.gain.gain.setTargetAtTime(this.params.movement * 0.22, t, timeConstant);
                this.nodes.lfoQ2.gain.gain.setTargetAtTime(this.params.movement * 1.6, t, timeConstant);
                this.nodes.lfoTrem3.gain.gain.setTargetAtTime(this.params.movement * 0.12, t, timeConstant);

                // Reverb
                const rSend = this.params.reverb * 0.9;
                this.nodes.send1.gain.setTargetAtTime(rSend * 0.7, t, timeConstant);
                this.nodes.send2.gain.setTargetAtTime(rSend * 0.85, t, timeConstant);
                this.nodes.send3.gain.setTargetAtTime(rSend * 1.0, t, timeConstant);
                this.nodes.reverbGain.gain.setTargetAtTime(this.params.reverb * 1.1, t, timeConstant);
                this.nodes.dryMix.gain.setTargetAtTime(1.0 - this.params.reverb * 0.5, t, timeConstant);
            }

            // ─────────────────────────────────────
            // STOCHASTIC EVENTS
            // ─────────────────────────────────────
            scheduleNextEvent() {
                if (!this.isRunning) return;
                const interval = 35000 + Math.random() * 55000;
                this.eventTimeout = setTimeout(() => {
                    if (!this.isRunning) return;
                    this.triggerEvent();
                    this.scheduleNextEvent();
                }, interval);
            }

            triggerEvent() {
                const t = this.audioCtx.currentTime;
                const eventType = Math.floor(Math.random() * 5);
                
                switch (eventType) {
                    case 0: // Reverb swell
                        this.nodes.reverbGain.gain.setTargetAtTime(Math.min(this.nodes.reverbGain.gain.value * 2.5, 0.7), t, 1.5);
                        setTimeout(() => this.applyParameters(), 4000); // Return to normal
                        this.ui.stateLabel.textContent = '— spatial expansion —';
                        break;
                    case 1: // Deep layer intensifies
                        this.nodes.gain1.gain.setTargetAtTime(Math.min(this.nodes.gain1.gain.value * 1.8, 0.7), t, 2.0);
                        setTimeout(() => this.applyParameters(), 5000);
                        this.ui.stateLabel.textContent = '— deepening resonance —';
                        break;
                    case 2: // Sparkle layer brightens
                        this.nodes.hp3.frequency.setTargetAtTime(this.nodes.hp3.frequency.value * 0.55, t, 1.8);
                        setTimeout(() => this.nodes.hp3.frequency.setTargetAtTime(4200, t, 2.0), 3500);
                        this.ui.stateLabel.textContent = '— crystalline shimmer —';
                        break;
                    case 3: // Mid texture shift
                        const newFreq = 1100 * (0.5 + Math.random() * 1.5);
                        this.nodes.bp2.frequency.setTargetAtTime(newFreq, t, 3.0);
                        this.ui.stateLabel.textContent = '— shifting currents —';
                        break;
                    case 4: // Movement intensifies
                        const origMovement = this.params.movement;
                        this.params.movement = Math.min(1.0, origMovement * 1.7);
                        this.applyParameters();
                        setTimeout(() => { this.params.movement = origMovement; this.applyParameters(); }, 6000);
                        this.ui.stateLabel.textContent = '— undulating motion —';
                        break;
                }

                // Reset label after a while
                setTimeout(() => {
                    if (this.isRunning) {
                        this.ui.stateLabel.textContent = '— evolving soundscape —';
                        this.ui.stateLabel.style.color = '#c8c8e0';
                    }
                }, 12000);
            }

            // ─────────────────────────────────────
            // PRESETS
            // ─────────────────────────────────────
            applyPreset(name) {
                const presets = {
                    deep: { volume: 0.55, density: 0.75, movement: 0.30, reverb: 0.45, desc: '— oceanic depths —' },
                    wind: { volume: 0.50, density: 0.50, movement: 0.70, reverb: 0.25, desc: '— windswept tundra —' },
                    crystal: { volume: 0.45, density: 0.40, movement: 0.55, reverb: 0.50, desc: '— crystalline frost —' },
                    experimental: { volume: 0.60, density: 0.60, movement: 0.85, reverb: 0.55, desc: '— experimental drift —' }
                };
                const p = presets[name];
                if (!p) return;

                this.params = { volume: p.volume, density: p.density, movement: p.movement, reverb: p.reverb };
                this.ui.sliderVolume.value = Math.round(p.volume * 100);
                this.ui.sliderDensity.value = Math.round(p.density * 100);
                this.ui.sliderMovement.value = Math.round(p.movement * 100);
                this.ui.sliderReverb.value = Math.round(p.reverb * 100);

                if (this.isRunning) {
                    this.applyParameters();
                    this.ui.stateLabel.textContent = p.desc;
                    this.ui.stateLabel.style.color = '#d8d0e8';
                    setTimeout(() => {
                        if (this.isRunning) {
                            this.ui.stateLabel.textContent = '— evolving soundscape —';
                            this.ui.stateLabel.style.color = '#c8c8e0';
                        }
                    }, 8000);
                }
            }

            // ─────────────────────────────────────
            // VISUALIZER
            // ─────────────────────────────────────
            resizeCanvas() {
                const rect = this.ui.canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                this.ui.canvas.width = rect.width * dpr;
                this.ui.canvas.height = rect.height * dpr;
            }

            drawIdleVisual() {
                const { ctx, canvas } = this.ui;
                const w = canvas.width, h = canvas.height;
                ctx.fillStyle = 'rgba(10,10,18,1)'; ctx.fillRect(0, 0, w, h);
                const cx = w / 2, cy = h / 2;
                const r = Math.min(w, h) * 0.12;
                const grad = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r);
                grad.addColorStop(0, 'rgba(80,60,100,0.5)'); grad.addColorStop(1, 'rgba(10,10,18,0)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
            }

            animateVisualizer() {
                if (!this.isRunning) return;
                this.animFrameId = requestAnimationFrame(() => this.animateVisualizer());

                const { ctx, canvas } = this.ui;
                const w = canvas.width, h = canvas.height;
                const dpr = window.devicePixelRatio || 1;
                const analyser = this.nodes.analyser;
                if (!analyser) return;

                const bins = new Float32Array(analyser.frequencyBinCount);
                analyser.getFloatFrequencyData(bins);

                ctx.clearRect(0, 0, w, h);

                // Background glow
                const totalEnergy = bins.reduce((a, v) => a + Math.max(0, (v + 90) / 90), 0) / bins.length;
                const glowAlpha = 0.06 + totalEnergy * 0.12;
                const bgGrad = ctx.createRadialGradient(w / 2, h / 2, w * 0.05, w / 2, h / 2, w * 0.75);
                bgGrad.addColorStop(0, `rgba(60,40,80,${glowAlpha * 1.5})`);
                bgGrad.addColorStop(1, 'rgba(10,10,18,0)');
                ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, w, h);

                // Radial Spectrum
                const cx = w / 2, cy = h / 2;
                const maxRadius = Math.min(w, h) * 0.44;
                const innerRadius = maxRadius * 0.18;
                const numBars = 200;
                const binsPerBar = Math.floor(bins.length / numBars);

                for (let i = 0; i < numBars; i++) {
                    let sum = 0;
                    for (let j = 0; j < binsPerBar; j++) sum += Math.max(0, (bins[i * binsPerBar + j] + 90) / 90);
                    const normalizedVal = Math.min(1, sum / binsPerBar);
                    const angle = (i / numBars) * Math.PI * 2 - Math.PI / 2;
                    const barLength = innerRadius + normalizedVal * (maxRadius - innerRadius);

                    const x1 = cx + Math.cos(angle) * innerRadius;
                    const y1 = cy + Math.sin(angle) * innerRadius;
                    const x2 = cx + Math.cos(angle) * barLength;
                    const y2 = cy + Math.sin(angle) * barLength;

                    const freqRatio = i / numBars;
                    let r, g, b;
                    if (freqRatio < 0.3) { r = 220; g = 120; b = 40; } // Amber
                    else if (freqRatio < 0.6) { r = 150; g = 120; b = 180; } // Purple transition
                    else { r = 90; g = 120; b = 220; } // Blue

                    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                    ctx.strokeStyle = `rgba(${r},${g},${b},${0.3 + normalizedVal * 0.7})`;
                    ctx.lineWidth = 1.8 * dpr; ctx.lineCap = 'round'; ctx.stroke();
                }

                // Center Orb
                const orbRadius = maxRadius * 0.10 + totalEnergy * maxRadius * 0.14;
                const orbGrad = ctx.createRadialGradient(cx, cy, orbRadius * 0.3, cx, cy, orbRadius);
                orbGrad.addColorStop(0, `hsla(${30 + totalEnergy * 40},60%,70%,0.9)`);
                orbGrad.addColorStop(1, 'rgba(20,15,30,0)');
                ctx.fillStyle = orbGrad; ctx.beginPath(); ctx.arc(cx, cy, orbRadius, 0, Math.PI * 2); ctx.fill();
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            window.soundscape = new SoundscapeEngine();
        });
    </script>
</body>
</html>
