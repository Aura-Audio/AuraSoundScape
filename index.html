<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundscape Generator – Structured Noise Engine</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --text: #c8c8d4;
            --accent1: #e0a458;
            --accent2: #5ba0c8;
            --accent3: #8b6c9e;
            --danger: #c55555;
            --glow-low: rgba(180, 100, 40, 0.4);
            --glow-mid: rgba(70, 130, 170, 0.35);
            --glow-high: rgba(140, 100, 180, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 820px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 300;
            letter-spacing: 0.06em;
            color: #e8e8f0;
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            color: #8888a0;
            text-transform: uppercase;
        }

        .state-label {
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            color: #b0b0c8;
            text-align: center;
            min-height: 1.4em;
            transition: color 3s ease, opacity 2s ease;
            opacity: 0.8;
        }

        .visualizer-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 1;
            max-height: 400px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--surface);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5), inset 0 0 80px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: #d0d0e0;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            font-family: inherit;
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(150, 150, 200, 0.2);
        }
        .btn.primary {
            background: rgba(200, 160, 80, 0.15);
            border-color: rgba(200, 160, 80, 0.5);
            color: #e8c878;
            font-weight: 500;
            font-size: 1.05rem;
            padding: 13px 34px;
        }
        .btn.primary:hover {
            background: rgba(200, 160, 80, 0.25);
            box-shadow: 0 0 35px var(--glow-low);
        }
        .btn.primary.running {
            background: rgba(200, 80, 70, 0.2);
            border-color: rgba(200, 80, 70, 0.5);
            color: #e89088;
        }
        .btn.primary.running:hover {
            background: rgba(200, 80, 70, 0.3);
            box-shadow: 0 0 35px rgba(200, 80, 70, 0.4);
        }
        .btn.preset {
            font-size: 0.8rem;
            padding: 8px 16px;
            border-radius: 20px;
            letter-spacing: 0.04em;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 80px;
        }
        .slider-group label {
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            color: #9999b0;
            text-transform: uppercase;
        }
        .slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            cursor: pointer;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #c8c8e0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(180, 180, 210, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
                gap: 14px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
            .btn.primary {
                padding: 11px 22px;
                font-size: 0.9rem;
            }
            .controls {
                gap: 10px;
            }
            .slider-group {
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Soundscape Generator</h1>
            <div class="subtitle">Structured · Evolving · Non-looping</div>
        </div>

        <div class="state-label" id="stateLabel">— awaiting initiation —</div>

        <div class="visualizer-wrap">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="controls">
            <button class="btn primary" id="btnStart" title="Start / Stop the soundscape">▶ Begin</button>
            <button class="btn preset" data-preset="deep">🌊 Deep</button>
            <button class="btn preset" data-preset="wind">🌬️ Wind</button>
            <button class="btn preset" data-preset="crystal">💎 Crystal</button>
            <button class="btn preset" data-preset="experimental">🌀 Experimental</button>
        </div>

        <div class="controls" style="flex-wrap:wrap;gap:20px;margin-top:4px;">
            <div class="slider-group">
                <label>Volume</label>
                <input type="range" id="sliderVolume" min="0" max="100" value="60" step="1">
            </div>
            <div class="slider-group">
                <label>Density</label>
                <input type="range" id="sliderDensity" min="20" max="100" value="65" step="1">
            </div>
            <div class="slider-group">
                <label>Movement</label>
                <input type="range" id="sliderMovement" min="10" max="100" value="55" step="1">
            </div>
            <div class="slider-group">
                <label>Reverb</label>
                <input type="range" id="sliderReverb" min="5" max="80" value="35" step="1">
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // DOM ELEMENTS
            // ─────────────────────────────────────
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const btnStart = document.getElementById('btnStart');
            const stateLabel = document.getElementById('stateLabel');
            const sliderVolume = document.getElementById('sliderVolume');
            const sliderDensity = document.getElementById('sliderDensity');
            const sliderMovement = document.getElementById('sliderMovement');
            const sliderReverb = document.getElementById('sliderReverb');
            const presetButtons = document.querySelectorAll('.btn.preset');

            // ─────────────────────────────────────
            // AUDIO ENGINE STATE
            // ─────────────────────────────────────
            let audioCtx = null;
            let isRunning = false;
            let analyser = null;
            let analyserData = null;
            let animationId = null;

            // Nodes that need cleanup
            let activeNodes = [];
            let lfoOscillators = [];
            let noiseSources = [];
            let reverbNodes = [];
            let masterGain = null;
            let reverbGain = null;

            // Parameter targets (smoothed)
            let targetVolume = 0.6;
            let targetDensity = 0.65;
            let targetMovement = 0.55;
            let targetReverb = 0.35;
            let currentVolume = 0.6;
            let currentDensity = 0.65;
            let currentMovement = 0.55;
            let currentReverb = 0.35;

            // Slow state tracking for label
            let slowPhaseAccum = 0;
            let currentStateName = '';

            // ─────────────────────────────────────
            // NOISE BUFFER CREATION
            // ─────────────────────────────────────
            function createNoiseBuffer(ctx, durationSec) {
                const sampleRate = ctx.sampleRate;
                const length = Math.floor(sampleRate * durationSec);
                const buffer = ctx.createBuffer(1, length, sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2) - 1;
                }
                return buffer;
            }

            // ─────────────────────────────────────
            // CREATE REVERB (Schroeder-style)
            // ─────────────────────────────────────
            function createReverb(ctx) {
                const delays = [0.0297, 0.0371, 0.0433, 0.0519]; // prime-related ms in seconds
                const feedbacks = [0.62, 0.58, 0.55, 0.50];
                const dampFreqs = [4000, 3500, 3000, 2800];

                const inputGain = ctx.createGain();
                inputGain.gain.value = 0.7;

                const outputGain = ctx.createGain();
                outputGain.gain.value = 1.0;

                const merger = ctx.createGain();
                merger.gain.value = 0.25;

                const allDelayNodes = [];
                const allFeedbackGains = [];
                const allDampFilters = [];

                for (let i = 0; i < delays.length; i++) {
                    const delayNode = ctx.createDelay(delays[i] + 0.01);
                    delayNode.delayTime.value = delays[i];

                    const feedbackGain = ctx.createGain();
                    feedbackGain.gain.value = feedbacks[i];

                    const dampFilter = ctx.createBiquadFilter();
                    dampFilter.type = 'lowpass';
                    dampFilter.frequency.value = dampFreqs[i];
                    dampFilter.Q.value = 0.5;

                    // Feedback loop: delay → damp → feedback → back to delay
                    delayNode.connect(dampFilter);
                    dampFilter.connect(feedbackGain);
                    feedbackGain.connect(delayNode);

                    // Output from the delay
                    delayNode.connect(merger);

                    allDelayNodes.push(delayNode);
                    allFeedbackGains.push(feedbackGain);
                    allDampFilters.push(dampFilter);
                }

                inputGain.connect(merger);
                // Send input to all delay loops
                for (const dn of allDelayNodes) {
                    inputGain.connect(dn);
                }

                merger.connect(outputGain);

                return {
                    input: inputGain,
                    output: outputGain,
                    merger: merger,
                    delayNodes: allDelayNodes,
                    feedbackGains: allFeedbackGains,
                    dampFilters: allDampFilters,
                    cleanup: () => {
                        inputGain.disconnect();
                        outputGain.disconnect();
                        merger.disconnect();
                        for (const dn of allDelayNodes) dn.disconnect();
                        for (const fg of allFeedbackGains) fg.disconnect();
                        for (const df of allDampFilters) df.disconnect();
                    }
                };
            }

            // ─────────────────────────────────────
            // BUILD THE FULL AUDIO GRAPH
            // ─────────────────────────────────────
            function buildAudioGraph(ctx) {
                const nodes = [];
                const lfos = [];
                const sources = [];
                let rev = null;
                let mGain = null;
                let rGain = null;

                // Create noise buffers with prime-related durations
                const buffer1 = createNoiseBuffer(ctx, 7.31); // ~7.3s
                const buffer2 = createNoiseBuffer(ctx, 11.17); // ~11.2s
                const buffer3 = createNoiseBuffer(ctx, 13.43); // ~13.4s
                // LCM of 7.31, 11.17, 13.43 is huge — pattern won't repeat for hours

                // ── Layer 1: Deep Rumble (Brown-ish via heavy lowpass) ──
                const src1 = ctx.createBufferSource();
                src1.buffer = buffer1;
                src1.loop = true;
                const gain1a = ctx.createGain();
                gain1a.gain.value = 0.55;
                const lpFilter1 = ctx.createBiquadFilter();
                lpFilter1.type = 'lowpass';
                lpFilter1.frequency.value = 160;
                lpFilter1.Q.value = 0.45;
                const gain1b = ctx.createGain();
                gain1b.gain.value = 0.40;

                src1.connect(gain1a);
                gain1a.connect(lpFilter1);
                lpFilter1.connect(gain1b);

                sources.push(src1);
                nodes.push(gain1a, lpFilter1, gain1b);

                // LFO for Layer 1 filter cutoff
                const lfo1 = ctx.createOscillator();
                lfo1.type = 'sine';
                lfo1.frequency.value = 0.027; // ~37 second cycle
                const lfo1Gain = ctx.createGain();
                lfo1Gain.gain.value = 65; // ±65Hz modulation
                lfo1.connect(lfo1Gain);
                lfo1Gain.connect(lpFilter1.frequency);
                lfos.push(lfo1);
                nodes.push(lfo1Gain);

                // Slow amplitude modulation on Layer 1
                const lfo1b = ctx.createOscillator();
                lfo1b.type = 'triangle';
                lfo1b.frequency.value = 0.033;
                const lfo1bGain = ctx.createGain();
                lfo1bGain.gain.value = 0.12;
                lfo1b.connect(lfo1bGain);
                lfo1bGain.connect(gain1b.gain);
                lfos.push(lfo1b);
                nodes.push(lfo1bGain);

                // ── Layer 2: Mid Texture (Bandpass) ──
                const src2 = ctx.createBufferSource();
                src2.buffer = buffer2;
                src2.loop = true;
                const gain2a = ctx.createGain();
                gain2a.gain.value = 0.50;
                const bpFilter2 = ctx.createBiquadFilter();
                bpFilter2.type = 'bandpass';
                bpFilter2.frequency.value = 1100;
                bpFilter2.Q.value = 2.2;
                const gain2b = ctx.createGain();
                gain2b.gain.value = 0.28;

                src2.connect(gain2a);
                gain2a.connect(bpFilter2);
                bpFilter2.connect(gain2b);

                sources.push(src2);
                nodes.push(gain2a, bpFilter2, gain2b);

                // LFO for Layer 2 filter frequency
                const lfo2 = ctx.createOscillator();
                lfo2.type = 'sine';
                lfo2.frequency.value = 0.041;
                const lfo2Gain = ctx.createGain();
                lfo2Gain.gain.value = 450;
                lfo2.connect(lfo2Gain);
                lfo2Gain.connect(bpFilter2.frequency);
                lfos.push(lfo2);
                nodes.push(lfo2Gain);

                // LFO for Layer 2 Q
                const lfo2q = ctx.createOscillator();
                lfo2q.type = 'sine';
                lfo2q.frequency.value = 0.073;
                const lfo2qGain = ctx.createGain();
                lfo2qGain.gain.value = 0.9;
                lfo2q.connect(lfo2qGain);
                lfo2qGain.connect(bpFilter2.Q);
                lfos.push(lfo2q);
                nodes.push(lfo2qGain);

                // ── Layer 3: Air / Sparkle (Highpass) ──
                const src3 = ctx.createBufferSource();
                src3.buffer = buffer3;
                src3.loop = true;
                const gain3a = ctx.createGain();
                gain3a.gain.value = 0.40;
                const hpFilter3 = ctx.createBiquadFilter();
                hpFilter3.type = 'highpass';
                hpFilter3.frequency.value = 4200;
                hpFilter3.Q.value = 0.6;
                const gain3b = ctx.createGain();
                gain3b.gain.value = 0.18;

                src3.connect(gain3a);
                gain3a.connect(hpFilter3);
                hpFilter3.connect(gain3b);

                sources.push(src3);
                nodes.push(gain3a, hpFilter3, gain3b);

                // LFO for Layer 3 filter frequency
                const lfo3 = ctx.createOscillator();
                lfo3.type = 'sine';
                lfo3.frequency.value = 0.059;
                const lfo3Gain = ctx.createGain();
                lfo3Gain.gain.value = 1800;
                lfo3.connect(lfo3Gain);
                lfo3Gain.connect(hpFilter3.frequency);
                lfos.push(lfo3);
                nodes.push(lfo3Gain);

                // Tremolo on Layer 3
                const lfo3b = ctx.createOscillator();
                lfo3b.type = 'sine';
                lfo3b.frequency.value = 0.11;
                const lfo3bGain = ctx.createGain();
                lfo3bGain.gain.value = 0.06;
                lfo3b.connect(lfo3bGain);
                lfo3bGain.connect(gain3b.gain);
                lfos.push(lfo3b);
                nodes.push(lfo3bGain);

                // ── Panning for stereo width ──
                const panner1 = ctx.createStereoPanner();
                panner1.pan.value = -0.15;
                const panner2 = ctx.createStereoPanner();
                panner2.pan.value = 0.10;
                const panner3 = ctx.createStereoPanner();
                panner3.pan.value = 0.20;

                gain1b.connect(panner1);
                gain2b.connect(panner2);
                gain3b.connect(panner3);
                nodes.push(panner1, panner2, panner3);

                // ── Reverb ──
                rev = createReverb(ctx);
                reverbNodes = [rev];
                rGain = ctx.createGain();
                rGain.gain.value = 0.30;
                rev.output.connect(rGain);

                // Send to reverb from each layer
                const send1 = ctx.createGain();
                send1.gain.value = 0.35;
                const send2 = ctx.createGain();
                send2.gain.value = 0.45;
                const send3 = ctx.createGain();
                send3.gain.value = 0.50;
                gain1b.connect(send1);
                gain2b.connect(send2);
                gain3b.connect(send3);
                send1.connect(rev.input);
                send2.connect(rev.input);
                send3.connect(rev.input);
                nodes.push(send1, send2, send3);

                // ── Dry mix ──
                const dryMix = ctx.createGain();
                dryMix.gain.value = 0.85;
                panner1.connect(dryMix);
                panner2.connect(dryMix);
                panner3.connect(dryMix);
                nodes.push(dryMix);

                // ── Master ──
                mGain = ctx.createGain();
                mGain.gain.value = 0.55;
                dryMix.connect(mGain);
                rGain.connect(mGain);
                nodes.push(mGain);

                // ── Analyser ──
                const analyserNode = ctx.createAnalyser();
                analyserNode.fftSize = 2048;
                analyserNode.smoothingTimeConstant = 0.82;
                analyserNode.minDecibels = -90;
                analyserNode.maxDecibels = -10;
                mGain.connect(analyserNode);
                nodes.push(analyserNode);

                // Analyser → destination
                analyserNode.connect(ctx.destination);

                // ── Very slow master LFO (multi-minute cycle) ──
                const masterLfo = ctx.createOscillator();
                masterLfo.type = 'sine';
                masterLfo.frequency.value = 0.0056; // ~3 minute cycle
                const masterLfoGain = ctx.createGain();
                masterLfoGain.gain.value = 0.10;
                masterLfo.connect(masterLfoGain);
                masterLfoGain.connect(mGain.gain);
                lfos.push(masterLfo);
                nodes.push(masterLfoGain);

                return {
                    sources,
                    lfos,
                    nodes,
                    reverb: rev,
                    rGain,
                    masterGain: mGain,
                    analyser: analyserNode,
                    layerGains: [gain1b, gain2b, gain3b],
                    layerFilters: [lpFilter1, bpFilter2, hpFilter3],
                    lfoGains: [lfo1Gain, lfo2Gain, lfo3Gain, lfo1bGain, lfo2qGain, lfo3bGain, masterLfoGain],
                    sendGains: [send1, send2, send3],
                    dryMix,
                };
            }

            // ─────────────────────────────────────
            // START / STOP
            // ─────────────────────────────────────
            function startEngine() {
                if (isRunning) return;

                // Create or resume AudioContext
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const graph = buildAudioGraph(audioCtx);
                activeNodes = graph.nodes;
                lfoOscillators = graph.lfos;
                noiseSources = graph.sources;
                reverbNodes = graph.reverb ? [graph.reverb] : [];
                masterGain = graph.masterGain;
                reverbGain = graph.rGain;
                analyser = graph.analyser;
                analyserData = new Float32Array(analyser.frequencyBinCount);

                // Store layer references for dynamic control
                window._soundscapeLayerGains = graph.layerGains;
                window._soundscapeLayerFilters = graph.layerFilters;
                window._soundscapeLfoGains = graph.lfoGains;
                window._soundscapeSendGains = graph.sendGains;
                window._soundscapeDryMix = graph.dryMix;
                window._soundscapeReverbGain = graph.rGain;
                window._soundscapeMasterGain = graph.masterGain;

                // Start all sources
                for (const src of graph.sources) {
                    src.start(0);
                }
                // Start all LFOs
                for (const lfo of graph.lfos) {
                    lfo.start(0);
                }

                // Apply current parameter targets
                applyAllParameters();

                isRunning = true;
                btnStart.textContent = '■ Stop';
                btnStart.classList.add('running');
                stateLabel.textContent = '— emerging soundscape —';
                stateLabel.style.color = '#c8c8e0';

                // Start visualization
                animateVisualizer();

                // Start event system
                scheduleNextEvent();
            }

            function stopEngine() {
                if (!isRunning) return;

                // Stop all sources
                for (const src of noiseSources) {
                    try { src.stop(0); } catch (e) { /* already stopped */ }
                }
                // Stop all LFOs
                for (const lfo of lfoOscillators) {
                    try { lfo.stop(0); } catch (e) { /* already stopped */ }
                }

                // Disconnect and clean up
                for (const node of activeNodes) {
                    try { node.disconnect(); } catch (e) { /* ignore */ }
                }
                for (const rev of reverbNodes) {
                    if (rev && rev.cleanup) rev.cleanup();
                }
                if (analyser) {
                    try { analyser.disconnect(); } catch (e) { /* ignore */ }
                }

                activeNodes = [];
                lfoOscillators = [];
                noiseSources = [];
                reverbNodes = [];
                masterGain = null;
                reverbGain = null;
                analyser = null;
                analyserData = null;
                window._soundscapeLayerGains = null;
                window._soundscapeLayerFilters = null;
                window._soundscapeLfoGains = null;
                window._soundscapeSendGains = null;
                window._soundscapeDryMix = null;
                window._soundscapeReverbGain = null;
                window._soundscapeMasterGain = null;

                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }

                // Clear any pending events
                if (window._soundscapeEventTimeout) {
                    clearTimeout(window._soundscapeEventTimeout);
                    window._soundscapeEventTimeout = null;
                }

                isRunning = false;
                btnStart.textContent = '▶ Begin';
                btnStart.classList.remove('running');
                stateLabel.textContent = '— silent —';
                stateLabel.style.color = '#8888a0';
                slowPhaseAccum = 0;
                currentStateName = '';

                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            function toggleEngine() {
                if (isRunning) {
                    stopEngine();
                } else {
                    startEngine();
                }
            }

            // ─────────────────────────────────────
            // PARAMETER APPLICATION
            // ─────────────────────────────────────
            function applyAllParameters() {
                if (!isRunning) return;
                const lg = window._soundscapeLayerGains;
                const lf = window._soundscapeLayerFilters;
                const lfoG = window._soundscapeLfoGains;
                const sg = window._soundscapeSendGains;
                const dry = window._soundscapeDryMix;
                const rG = window._soundscapeReverbGain;
                const mG = window._soundscapeMasterGain;

                const vol = currentVolume;
                const dens = currentDensity;
                const mov = currentMovement;
                const rev = currentReverb;

                // Master volume
                if (mG) mG.gain.value = vol * 0.7;

                // Density: scales layer gains
                if (lg && lg.length >= 3) {
                    lg[0].gain.value = 0.25 + dens * 0.45; // deep layer
                    lg[1].gain.value = 0.10 + dens * 0.40; // mid layer
                    lg[2].gain.value = 0.05 + dens * 0.30; // air layer
                }

                // Movement: scales LFO depths
                if (lfoG && lfoG.length >= 7) {
                    lfoG[0].gain.value = 25 + mov * 100; // filter 1 LFO depth
                    lfoG[1].gain.value = 150 + mov * 700; // filter 2 LFO depth
                    lfoG[2].gain.value = 600 + mov * 2800; // filter 3 LFO depth
                    lfoG[3].gain.value = mov * 0.22; // amp mod depth layer 1
                    lfoG[4].gain.value = mov * 1.6; // Q mod depth
                    lfoG[5].gain.value = mov * 0.12; // tremolo depth
                    lfoG[6].gain.value = mov * 0.16; // master LFO depth
                }

                // Reverb amount
                if (sg && sg.length >= 3 && rG) {
                    const rSend = rev * 0.9;
                    sg[0].gain.value = rSend * 0.7;
                    sg[1].gain.value = rSend * 0.85;
                    sg[2].gain.value = rSend * 1.0;
                    rG.gain.value = rev * 1.1;
                }

                // Dry mix adjustment
                if (dry) {
                    dry.gain.value = 1.0 - rev * 0.5;
                }

                // Adjust filter base frequencies slightly based on density
                if (lf && lf.length >= 3) {
                    // Layer 1: deeper with more density
                    // Layer 2: wider with more density
                    // Layer 3: brighter with more density
                    // (Keep base freqs but they're modulated by LFOs)
                }
            }

            function smoothParameters() {
                const smoothing = 0.04;
                currentVolume += (targetVolume - currentVolume) * smoothing;
                currentDensity += (targetDensity - currentDensity) * smoothing;
                currentMovement += (targetMovement - currentMovement) * smoothing;
                currentReverb += (targetReverb - currentReverb) * smoothing;

                if (isRunning && (Math.abs(targetVolume - currentVolume) > 0.001 ||
                        Math.abs(targetDensity - currentDensity) > 0.001 ||
                        Math.abs(targetMovement - currentMovement) > 0.001 ||
                        Math.abs(targetReverb - currentReverb) > 0.001)) {
                    applyAllParameters();
                }

                if (isRunning) {
                    requestAnimationFrame(() => {
                        smoothParameters();
                    });
                }
            }

            // ─────────────────────────────────────
            // EVENT SYSTEM (structural changes)
            // ─────────────────────────────────────
            function scheduleNextEvent() {
                if (!isRunning) return;
                const interval = 35000 + Math.random() * 55000; // 35-90 seconds
                window._soundscapeEventTimeout = setTimeout(() => {
                    if (!isRunning) return;
                    triggerEvent();
                    scheduleNextEvent();
                }, interval);
            }

            function triggerEvent() {
                if (!isRunning) return;
                const eventType = Math.floor(Math.random() * 5);
                const lg = window._soundscapeLayerGains;
                const lf = window._soundscapeLayerFilters;
                const lfoG = window._soundscapeLfoGains;
                const sg = window._soundscapeSendGains;
                const rG = window._soundscapeReverbGain;

                switch (eventType) {
                    case 0: // Brief reverb swell
                        if (rG && sg && sg.length >= 3) {
                            const origR = rG.gain.value;
                            const origS = sg.map(s => s.gain.value);
                            rG.gain.setTargetAtTime(Math.min(origR * 2.5, 0.7), audioCtx.currentTime, 1.5);
                            for (const s of sg) s.gain.setTargetAtTime(s.gain.value * 2.0, audioCtx.currentTime,
                                1.5);
                            setTimeout(() => {
                                if (!isRunning || !rG) return;
                                rG.gain.setTargetAtTime(origR, audioCtx.currentTime, 4.0);
                                for (let i = 0; i < sg.length; i++)
                                    sg[i].gain.setTargetAtTime(origS[i], audioCtx.currentTime, 4.0);
                            }, 4000);
                        }
                        stateLabel.textContent = '— spatial expansion —';
                        stateLabel.style.color = '#b8c8e8';
                        break;
                    case 1: // Deep layer intensifies
                        if (lg && lg[0]) {
                            const orig = lg[0].gain.value;
                            lg[0].gain.setTargetAtTime(Math.min(orig * 1.8, 0.7), audioCtx.currentTime, 2.0);
                            setTimeout(() => {
                                if (!isRunning || !lg || !lg[0]) return;
                                lg[0].gain.setTargetAtTime(orig, audioCtx.currentTime, 6.0);
                            }, 5000);
                        }
                        stateLabel.textContent = '— deepening resonance —';
                        stateLabel.style.color = '#d8b878';
                        break;
                    case 2: // Sparkle layer brightens
                        if (lf && lf[2]) {
                            const orig = lf[2].frequency.value;
                            lf[2].frequency.setTargetAtTime(orig * 0.55, audioCtx.currentTime, 1.8);
                            setTimeout(() => {
                                if (!isRunning || !lf || !lf[2]) return;
                                lf[2].frequency.setTargetAtTime(orig, audioCtx.currentTime, 5.0);
                            }, 3500);
                        }
                        stateLabel.textContent = '— crystalline shimmer —';
                        stateLabel.style.color = '#c8c0f0';
                        break;
                    case 3: // Mid texture shift
                        if (lf && lf[1]) {
                            const orig = lf[1].frequency.value;
                            const newFreq = orig * (0.5 + Math.random() * 1.5);
                            lf[1].frequency.setTargetAtTime(newFreq, audioCtx.currentTime, 3.0);
                        }
                        stateLabel.textContent = '— shifting currents —';
                        stateLabel.style.color = '#a8c8c8';
                        break;
                    case 4: // Movement intensifies briefly
                        if (lfoG && lfoG.length >= 6) {
                            const origDepths = lfoG.slice(0, 6).map(g => g.gain.value);
                            for (let i = 0; i < 6; i++) {
                                lfoG[i].gain.setTargetAtTime(origDepths[i] * 1.7, audioCtx.currentTime, 1.5);
                            }
                            setTimeout(() => {
                                if (!isRunning || !lfoG) return;
                                for (let i = 0; i < 6; i++) {
                                    if (lfoG[i]) lfoG[i].gain.setTargetAtTime(origDepths[i], audioCtx
                                        .currentTime, 5.0);
                                }
                            }, 6000);
                        }
                        stateLabel.textContent = '— undulating motion —';
                        stateLabel.style.color = '#d0c0a0';
                        break;
                }

                // Reset label after a while
                setTimeout(() => {
                    if (isRunning && stateLabel.textContent.indexOf('—') === 0 &&
                        stateLabel.textContent.indexOf('soundscape') === -1) {
                        stateLabel.textContent = '— evolving soundscape —';
                        stateLabel.style.color = '#c8c8e0';
                    }
                }, 12000);
            }

            // ─────────────────────────────────────
            // VISUALIZER
            // ─────────────────────────────────────
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                const w = rect.width * dpr;
                const h = rect.height * dpr;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                }
            }

            function animateVisualizer() {
                if (!isRunning) {
                    animationId = null;
                    return;
                }
                animationId = requestAnimationFrame(animateVisualizer);

                resizeCanvas();
                const w = canvas.width;
                const h = canvas.height;
                const dpr = window.devicePixelRatio || 1;

                if (!analyser || !analyserData) return;
                analyser.getFloatFrequencyData(analyserData);
                const bins = analyserData; // length = fftSize/2 = 1024

                ctx.clearRect(0, 0, w, h);

                // ── Background glow ──
                const totalEnergy = bins.reduce((a, v) => a + Math.max(0, (v + 90) / 90), 0) / bins.length;
                const glowAlpha = 0.06 + totalEnergy * 0.12;
                const bgGrad = ctx.createRadialGradient(w / 2, h / 2, w * 0.05, w / 2, h / 2, w * 0.75);
                bgGrad.addColorStop(0, `rgba(60,40,80,${glowAlpha * 1.5})`);
                bgGrad.addColorStop(0.5, `rgba(30,25,50,${glowAlpha})`);
                bgGrad.addColorStop(1, 'rgba(10,10,18,0)');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, w, h);

                // ── Radial spectrum ──
                const cx = w / 2;
                const cy = h / 2;
                const maxRadius = Math.min(w, h) * 0.44;
                const innerRadius = maxRadius * 0.18;
                const numBars = 200;
                const binsPerBar = Math.floor(bins.length / numBars);

                // Draw radial bars
                for (let i = 0; i < numBars; i++) {
                    const startBin = i * binsPerBar;
                    let sum = 0;
                    const count = Math.min(binsPerBar, bins.length - startBin);
                    for (let j = 0; j < count; j++) {
                        const val = bins[startBin + j];
                        sum += Math.max(0, (val + 90) / 90); // normalize: -90dB→0, -10dB→~0.89
                    }
                    const avg = sum / count;
                    const normalizedVal = Math.min(1, avg);

                    const angle = (i / numBars) * Math.PI * 2 - Math.PI / 2;
                    const barLength = innerRadius + normalizedVal * (maxRadius - innerRadius);

                    const x1 = cx + Math.cos(angle) * innerRadius;
                    const y1 = cy + Math.sin(angle) * innerRadius;
                    const x2 = cx + Math.cos(angle) * barLength;
                    const y2 = cy + Math.sin(angle) * barLength;

                    // Color based on frequency and magnitude
                    const freqRatio = i / numBars;
                    let r, g, b;
                    if (freqRatio < 0.25) {
                        // Low: warm amber to deep orange
                        const t = freqRatio / 0.25;
                        r = 220 + t * 30;
                        g = 120 + t * 60;
                        b = 40 + t * 30;
                    } else if (freqRatio < 0.6) {
                        // Mid: warm to cool transition
                        const t = (freqRatio - 0.25) / 0.35;
                        r = 250 - t * 160;
                        g = 180 - t * 60;
                        b = 70 + t * 110;
                    } else {
                        // High: cool blues and violets
                        const t = (freqRatio - 0.6) / 0.4;
                        r = 90 - t * 50;
                        g = 120 - t * 60;
                        b = 180 + t * 60;
                    }

                    const alpha = 0.35 + normalizedVal * 0.65;
                    const glowAmount = normalizedVal * 0.6;

                    // Draw bar
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${alpha})`;
                    ctx.lineWidth = 1.8 * dpr;
                    ctx.lineCap = 'round';
                    ctx.stroke();

                    // Glow on brighter bars
                    if (normalizedVal > 0.4) {
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle =
                            `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${glowAmount * 0.5})`;
                        ctx.lineWidth = 5 * dpr;
                        ctx.stroke();
                    }
                }

                // ── Center orb ──
                const lowEnergy = bins.slice(0, 40).reduce((a, v) => a + Math.max(0, (v + 90) / 90), 0) / 40;
                const orbRadius = maxRadius * 0.10 + lowEnergy * maxRadius * 0.14;
                const orbGrad = ctx.createRadialGradient(cx, cy, orbRadius * 0.3, cx, cy, orbRadius);
                const orbHue = 30 + totalEnergy * 40; // shifts with energy
                orbGrad.addColorStop(0, `hsla(${orbHue},60%,70%,0.9)`);
                orbGrad.addColorStop(0.5, `hsla(${orbHue},50%,40%,0.5)`);
                orbGrad.addColorStop(1, 'rgba(20,15,30,0)');
                ctx.fillStyle = orbGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, orbRadius, 0, Math.PI * 2);
                ctx.fill();

                // ── Subtle particles ──
                const particleCount = 18;
                for (let p = 0; p < particleCount; p++) {
                    const seed = p * 37.791 + slowPhaseAccum * 0.3;
                    const angle = (seed % (Math.PI * 2));
                    const dist = innerRadius + (Math.sin(seed * 1.7 + slowPhaseAccum * 0.02) * 0.5 + 0.5) * (maxRadius -
                        innerRadius) * 0.9;
                    const px = cx + Math.cos(angle) * dist;
                    const py = cy + Math.sin(angle) * dist;
                    const pAlpha = 0.15 + (Math.sin(seed * 3.1 + slowPhaseAccum * 0.04) * 0.5 + 0.5) * 0.5;
                    ctx.fillStyle = `rgba(200,200,230,${pAlpha})`;
                    ctx.beginPath();
                    ctx.arc(px, py, 1.5 * dpr, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Update slow phase for label tracking
                slowPhaseAccum += 0.003;
                updateStateLabel(totalEnergy, lowEnergy);
            }

            function updateStateLabel(totalEnergy, lowEnergy) {
                if (!isRunning) return;
                // Only update occasionally
                if (Math.floor(slowPhaseAccum * 10) % 17 !== 0 && currentStateName !== '') return;

                let newName = '';
                if (lowEnergy > 0.55 && totalEnergy > 0.4) {
                    newName = '— subterranean resonance —';
                } else if (lowEnergy > 0.45 && totalEnergy < 0.35) {
                    newName = '— deep quietude —';
                } else if (totalEnergy > 0.5 && lowEnergy < 0.35) {
                    newName = '— windswept expanse —';
                } else if (totalEnergy > 0.35 && lowEnergy < 0.3) {
                    newName = '— crystalline aether —';
                } else if (totalEnergy < 0.25) {
                    newName = '— sparse drift —';
                } else {
                    newName = '— harmonic convergence —';
                }

                if (newName !== currentStateName && stateLabel.textContent.indexOf('—') === 0 &&
                    stateLabel.textContent.indexOf('soundscape') === -1 &&
                    stateLabel.textContent.indexOf('expansion') === -1 &&
                    stateLabel.textContent.indexOf('resonance') === -1 &&
                    stateLabel.textContent.indexOf('shimmer') === -1 &&
                    stateLabel.textContent.indexOf('currents') === -1 &&
                    stateLabel.textContent.indexOf('motion') === -1) {
                    currentStateName = newName;
                    stateLabel.textContent = newName;
                    stateLabel.style.color = '#c8c8e0';
                }
                if (currentStateName === '') {
                    currentStateName = newName;
                    if (stateLabel.textContent.indexOf('—') !== 0 || stateLabel.textContent === '— silent —') {
                        stateLabel.textContent = newName;
                    }
                }
            }

            // ─────────────────────────────────────
            // PRESETS
            // ─────────────────────────────────────
            const presets = {
                deep: { volume: 0.55, density: 0.75, movement: 0.30, reverb: 0.45,
                    desc: '— oceanic depths —' },
                wind: { volume: 0.50, density: 0.50, movement: 0.70, reverb: 0.25,
                desc: '— windswept tundra —' },
                crystal: { volume: 0.45, density: 0.40, movement: 0.55, reverb: 0.50,
                    desc: '— crystalline frost —' },
                experimental: { volume: 0.60, density: 0.60, movement: 0.85, reverb: 0.55,
                    desc: '— experimental drift —' },
            };

            function applyPreset(name) {
                const p = presets[name];
                if (!p) return;
                targetVolume = p.volume;
                targetDensity = p.density;
                targetMovement = p.movement;
                targetReverb = p.reverb;
                sliderVolume.value = Math.round(p.volume * 100);
                sliderDensity.value = Math.round(p.density * 100);
                sliderMovement.value = Math.round(p.movement * 100);
                sliderReverb.value = Math.round(p.reverb * 100);

                if (isRunning) {
                    stateLabel.textContent = p.desc;
                    stateLabel.style.color = '#d8d0e8';
                    currentStateName = p.desc;
                    setTimeout(() => {
                        if (isRunning && stateLabel.textContent === p.desc) {
                            stateLabel.textContent = '— evolving soundscape —';
                            stateLabel.style.color = '#c8c8e0';
                            currentStateName = '— evolving soundscape —';
                        }
                    }, 8000);
                }
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            btnStart.addEventListener('click', toggleEngine);

            sliderVolume.addEventListener('input', () => {
                targetVolume = parseInt(sliderVolume.value) / 100;
                if (!isRunning) currentVolume = targetVolume;
            });
            sliderDensity.addEventListener('input', () => {
                targetDensity = parseInt(sliderDensity.value) / 100;
                if (!isRunning) currentDensity = targetDensity;
            });
            sliderMovement.addEventListener('input', () => {
                targetMovement = parseInt(sliderMovement.value) / 100;
                if (!isRunning) currentMovement = targetMovement;
            });
            sliderReverb.addEventListener('input', () => {
                targetReverb = parseInt(sliderReverb.value) / 100;
                if (!isRunning) currentReverb = targetReverb;
            });

            presetButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const presetName = btn.dataset.preset;
                    if (presetName) applyPreset(presetName);
                });
            });

            // Keyboard shortcut: Space to toggle
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target === document.body) {
                    e.preventDefault();
                    toggleEngine();
                }
                if (e.code === 'KeyD' && !e.ctrlKey && !e.metaKey) applyPreset('deep');
                if (e.code === 'KeyW' && !e.ctrlKey && !e.metaKey) applyPreset('wind');
                if (e.code === 'KeyC' && !e.ctrlKey && !e.metaKey) applyPreset('crystal');
                if (e.code === 'KeyE' && !e.ctrlKey && !e.metaKey) applyPreset('experimental');
            });

            // Handle page unload
            window.addEventListener('beforeunload', () => {
                if (isRunning) stopEngine();
            });

            // Handle visibility change (pause when tab hidden, optional)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isRunning) {
                    // Optionally reduce processing; we'll keep running for audio continuity
                    // The audio continues in background which is fine for soundscapes
                }
            });

            // ─────────────────────────────────────
            // INITIALIZATION
            // ─────────────────────────────────────
            function init() {
                resizeCanvas();
                // Draw initial empty state on canvas
                ctx.fillStyle = 'rgba(10,10,18,1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const r = Math.min(canvas.width, canvas.height) * 0.12;
                const grad = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r);
                grad.addColorStop(0, 'rgba(80,60,100,0.5)');
                grad.addColorStop(1, 'rgba(10,10,18,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#555570';
                ctx.font = `${14 * (window.devicePixelRatio || 1)}px "Segoe UI", system-ui, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('press Begin or Space', cx, cy + r + 30 * (window.devicePixelRatio || 1));

                // Start the parameter smoothing loop
                smoothParameters();
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
                if (!isRunning) {
                    ctx.fillStyle = 'rgba(10,10,18,1)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2;
                    const r = Math.min(canvas.width, canvas.height) * 0.12;
                    const grad = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r);
                    grad.addColorStop(0, 'rgba(80,60,100,0.5)');
                    grad.addColorStop(1, 'rgba(10,10,18,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            init();

            console.log('🌊 Soundscape Generator ready.');
            console.log('   Press "Begin" or Space to start.');
            console.log('   Presets: D=Deep, W=Wind, C=Crystal, E=Experimental');
            console.log('   Layers: 3 noise sources (7.3s, 11.2s, 13.4s loops)');
            console.log('   Combined pattern period: ~hours (prime-length buffers × irrational LFOs)');
            console.log('   Structural events every 35-90 seconds.');
            console.log('   Enjoy the evolving soundscape.');
        })();
    </script>
</body>
</html>
